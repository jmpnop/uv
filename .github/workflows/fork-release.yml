name: Fork Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.11.7-fork.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for aarch64 linux)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --locked -p uv --target ${{ matrix.target }}
        env:
          CARGO_TERM_COLOR: always

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked -p uv --target ${{ matrix.target }}

      - name: Package (unix tar)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/uv"
          bin_uvx="target/${{ matrix.target }}/release/uvx"
          name="uv-${{ matrix.target }}"
          mkdir "${name}"
          cp "${bin}" "${name}/uv"
          [ -f "${bin_uvx}" ] && cp "${bin_uvx}" "${name}/uvx" || true
          tar czf "${name}.tar.gz" "${name}"
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" || sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - name: Package (windows zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "uv-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $name | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/uv.exe" "$name/uv.exe"
          if (Test-Path "target/${{ matrix.target }}/release/uvx.exe") {
            Copy-Item "target/${{ matrix.target }}/release/uvx.exe" "$name/uvx.exe"
          }
          Compress-Archive -Path $name -DestinationPath "$name.zip"
          $hash = (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -FilePath "$name.zip.sha256" -Encoding ascii

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uv-${{ matrix.target }}
          path: |
            uv-${{ matrix.target }}.tar.gz
            uv-${{ matrix.target }}.tar.gz.sha256
            uv-${{ matrix.target }}.zip
            uv-${{ matrix.target }}.zip.sha256
          if-no-files-found: ignore

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Stage installer scripts
        run: |
          cp install.sh dist/uv-installer.sh
          cp install.ps1 dist/uv-installer.ps1

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            Prebuilt binaries for the `jmpnop/uv` fork.

            ## Install

            macOS / Linux:
            ```
            curl -LsSf https://github.com/jmpnop/uv/releases/latest/download/uv-installer.sh | sh
            ```

            Windows (PowerShell):
            ```
            powershell -ExecutionPolicy ByPass -c "irm https://github.com/jmpnop/uv/releases/latest/download/uv-installer.ps1 | iex"
          files: |
            dist/*
          fail_on_unmatched_files: false
